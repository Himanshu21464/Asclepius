<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Asclepius">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14101D"/>
      <stop offset="1" stop-color="#0A0710"/>
    </linearGradient>
    <radialGradient id="glow" cx="16" cy="16" r="11" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B57BFF" stop-opacity=".55"/>
      <stop offset="1" stop-color="#B57BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square chassis -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#bg)" stroke="#2A2438" stroke-width="1"/>

  <!-- inner glow -->
  <circle cx="16" cy="16" r="11" fill="url(#glow)"/>

  <!-- tamper-evident seal: an almost-closed ring with a deliberate notch,
       with a purple anchor dot at the chain head. Reads as "verified
       chain link" at any size. -->
  <g transform="translate(16 16)">
    <!-- the seal ring -->
    <path d="M 9 0 A 9 9 0 1 0 -2.5 8.6"
          fill="none"
          stroke="#B57BFF"
          stroke-width="1.7"
          stroke-linecap="round"/>
    <!-- chain-head dot (the current entry) -->
    <circle cx="9" cy="0" r="2.4" fill="#B57BFF"/>
    <!-- inner accent — the surgical-green sentinel -->
    <circle cx="-3" cy="-3" r="1.1" fill="#34D399"/>
  </g>
</svg>
