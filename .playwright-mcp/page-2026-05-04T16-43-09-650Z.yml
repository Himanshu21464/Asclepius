        - listitem [ref=e534]:
          - time [ref=e535]: 2025–26
          - heading "DPDP Act, 2023, in force" [level=3] [ref=e536]
          - paragraph [ref=e537]: Every consent-mediated processing of personal data needs a recorded purpose, a TTL, and — for § 7 emergencies — a deferred-consent justification with a defensible window. No substrate, no defensible bundle.
        - listitem [ref=e538]:
          - time [ref=e539]: 2025–26
          - heading "ABDM / NHA consent fabric" [level=3] [ref=e540]
          - paragraph [ref=e541]: HIP / HIU exchanges land on a stable consent-artefact wire format. The kernel that wraps clinical AI underneath has to round-trip that envelope; piping it through bespoke per-operator code does not scale.
        - listitem [ref=e542]:
          - time [ref=e543]: 2025–26
          - heading "CDSCO SaMD guidance" [level=3] [ref=e544]
          - paragraph [ref=e545]: India's medical-devices regime now reaches AI-driven software. The artefacts a CDSCO reviewer expects — model lineage, drift, post-market performance — are exactly what an audit substrate emits, or not.
        - listitem [ref=e546]:
          - time [ref=e547]: 2026 Q1–Q2
          - heading "FDA, EU AI Act, AB 3030 in parallel" [level=3] [ref=e548]
          - paragraph [ref=e549]: For operators with US or EU exposure, lifecycle validation, Article 12 record-keeping, and AB 3030 disclosure obligations land at the same time. One substrate, every regime.
