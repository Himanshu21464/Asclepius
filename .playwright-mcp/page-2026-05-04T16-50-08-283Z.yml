      - generic [ref=e372]: "# PB-01 — chain broken — never zero increment is acceptable - alert: AsclepiusChainBroken expr: increase(asclepius_ledger_chain_broken_total[5m]) > 0 for: 0m labels: { severity: P1 } annotations: { runbook: \"playbooks.html#truncation\" } # PB-03 — key rotation due / overdue (180-day window) - alert: AsclepiusKeyRotationDue expr: asclepius_key_age_seconds > 180 * 86400 for: 1h labels: { severity: P3 } annotations: { runbook: \"playbooks.html#key-rotation\" } # PB-04 — drift PSI breach for > 30 min in any feature - alert: AsclepiusDriftBreach expr: max by (feature) (asclepius_drift_psi) > 0.25 for: 30m labels: { severity: P2 } annotations: { runbook: \"playbooks.html#drift-breach\" } # PB-05 — consent revocation propagation SLA (60 s p99) - alert: AsclepiusConsentLag expr: histogram_quantile(0.99, sum by (le) (rate(asclepius_consent_revocation_propagation_seconds_bucket[10m]))) > 60 for: 10m labels: { severity: P2 } annotations: { runbook: \"playbooks.html#consent-revocation\" } # PB-07 — backend unreachable for > 60 s - alert: AsclepiusBackendUnreachable expr: absent_over_time(asclepius_ledger_seq[60s]) for: 1m labels: { severity: P2 } annotations: { runbook: \"playbooks.html#partition\" } # bundle self-verify failure — should be zero ever - alert: AsclepiusBundleSelfVerifyFailed expr: increase(asclepius_bundle_verify_failures_total[15m]) > 0 for: 0m labels: { severity: P1 } # inference latency p99 > 500ms — soft alert, investigate the chain - alert: AsclepiusInferenceLatencyHigh expr: histogram_quantile(0.99, sum by (le, purpose) (rate(asclepius_inference_latency_seconds_bucket[5m]))) > 0.5 for: 10m labels: { severity: P3 } # policy violation rate > 5% in 5 min — model drift OR adversarial input - alert: AsclepiusPolicyViolationsElevated expr: sum(rate(asclepius_policy_violations_total[5m])) / sum(rate(asclepius_inferences_total[5m])) > 0.05 for: 10m labels: { severity: P2 } # consent denied rate > 1% — process problem, not substrate problem - alert: AsclepiusConsentDeniedElevated expr: sum(rate(asclepius_consent_checks_total{result=\"denied\"}[5m])) / sum(rate(asclepius_consent_checks_total[5m])) > 0.01 for: 15m labels: { severity: P3 } # ledger size growth alarm (4× expected weekly rate) - alert: AsclepiusLedgerGrowthAnomaly expr: deriv(asclepius_ledger_size_bytes[1d]) > 4 * deriv(asclepius_ledger_size_bytes[7d] offset 7d) for: 1h labels: { severity: P3 } # sign latency regression — usually means HSM trouble - alert: AsclepiusSignLatencyRegression expr: histogram_quantile(0.99, sum by (le) (rate(asclepius_sign_seconds_bucket[5m]))) > 0.005 for: 10m labels: { severity: P3 } # runtime read-only flag should be zero in steady state - alert: AsclepiusReadOnlyAsserted expr: asclepius_runtime_read_only == 1 for: 5m labels: { severity: P2 }"
