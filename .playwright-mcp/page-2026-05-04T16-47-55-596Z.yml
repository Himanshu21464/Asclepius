          - heading "Why a Merkle-chained signed ledger" [level=2] [ref=e105]
          - paragraph [ref=e106]:
            - text: A linear, append-only log signed by a single key is enough to detect tampering by any party who lacks the secret key. The
            - link "Merkle" [ref=e107] [cursor=pointer]:
              - /url: glossary.html#merkle
            - text: "chain (each entry includes the previous entry's hash) makes detection cheap: verifying the chain is O(n), and pinning the head out-of-band gives external proof of state at a point in time."
          - paragraph [ref=e108]: We did not use a blockchain. There is no decentralized trust to bootstrap; the trust anchor is the operator's public key. A blockchain would buy us nothing and cost us latency and complexity.
          - heading "Why SQLite" [level=2] [ref=e109]
          - paragraph [ref=e110]:
            - text: SQLite's WAL mode gives durable, single-writer-many-reader semantics with no daemon. The substrate is single-node by design — sidecars get one DB file each, one trust anchor each, one chain each.
            - emphasis [ref=e111]: One backend, less drift.
            - text: A previous prototype shipped a parallel Postgres backend; we ripped it in v0.4.0 after benchmarks came in 30× in SQLite's favour and the substrate-not-app posture made shared-write semantics irrelevant.
          - heading "Why Ed25519 + BLAKE2b" [level=2] [ref=e112]
          - list [ref=e113]:
            - listitem [ref=e114]:
              - strong [ref=e115]:
                - link "BLAKE2b-256" [ref=e116] [cursor=pointer]:
                  - /url: glossary.html#blake2b-256
              - text: "for hashing: faster than SHA-256, stronger margin, first-class libsodium support, 32-byte digest is unwieldy enough to prevent accidental collisions."
            - listitem [ref=e117]:
              - strong [ref=e118]: Ed25519
              - text: "for signatures: 32-byte public key, 64-byte signature, deterministic, fast verification, side-channel resistant, no parameter decisions to get wrong."
          - paragraph [ref=e119]: We did not use ECDSA P-256 or RSA. ECDSA leaks the private key on RNG failures during signing; RSA is slower and bigger. Ed25519 is the right default in 2026.
          - heading "Why C++20" [level=2] [ref=e120]
          - list [ref=e121]:
            - listitem [ref=e122]:
              - strong [ref=e123]: Inline latency.
              - text: Pre/post guards run on every inference. We need microseconds, not milliseconds.
            - listitem [ref=e124]:
              - strong [ref=e125]: Cryptographic throughput.
              - text: Hashing and signing across millions of daily inferences requires native crypto without a GIL.
            - listitem [ref=e126]:
              - strong [ref=e127]: Determinism.
              - text: Replay must reproduce byte-equal artifacts. C++ with
              - link "canonical JSON" [ref=e128] [cursor=pointer]:
                - /url: glossary.html#canonical-json
              - text: serialization gives that.
            - listitem [ref=e129]:
              - strong [ref=e130]: Long-lived ABI.
              - text: The C ABI exposed by the library is stable; passes evolve underneath.
          - paragraph [ref=e131]: The Python and (planned) Rust bindings are convenience shells over the same core.
          - heading "Storage model" [level=2] [ref=e132]
