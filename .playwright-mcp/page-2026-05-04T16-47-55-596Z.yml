          - heading "What is NOT in the runtime" [level=2] [ref=e174]
          - list [ref=e175]:
            - listitem [ref=e176]:
              - strong [ref=e177]: PHI storage.
              - text: The ledger holds hashes by default. Customers who need to inspect PHI use the encrypted-at-rest body-store (planned).
            - listitem [ref=e178]:
              - strong [ref=e179]: Model serving.
              - text: Asclepius wraps a model callback; it doesn't load weights, route requests, or speak to vLLM. That's the customer's job.
            - listitem [ref=e180]:
