          - paragraph [ref=e70]: "The layers are deliberately decoupled: PolicyChain knows nothing about Ledger, Ledger knows nothing about Drift. The Runtime is the only object that wires them, and it does so through narrow interfaces. Callers can swap any layer without touching the rest."
