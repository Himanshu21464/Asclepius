          - paragraph [ref=e61]: This document describes the runtime topology, the data flow for a single clinical-AI inference, and the rationale behind each component.
          - heading "Component map" [level=2] [ref=e62]
          - generic [ref=e63]:
            - code [ref=e65]: +----------------------+ | Caller (your tool) | +-----------+----------+ | v +----------------------+ | Runtime | | - begin_inference | | - policies() | | - drift() | | - consent() | | - evaluation() | | - metrics() | +----+-----+-----+-----+ consent check | run | commit v v v +-----------+--+----+--+----+-----------+ | PolicyChain| | | Ledger | | input/out | | | (Merkle, | | guards | | | signed) | +-----+------+ | +-----------+ | v ^ v +-----------+ | (model call) | Drift |-----+ | Monitor | (drift events appended on rotate) +-----------+ | v +-----------------+ | EvaluationHarness | - ground truth | | - overrides | | - bundle export | +-----------------+
            - button "copy code" [ref=e66] [cursor=pointer]:
