      - paragraph [ref=e144]:
        - text: "Every health system in 2026 is hand-rolling the same five things: drift monitors, audit trails, override tracking, consent ledgers, prospective evaluation harnesses."
        - emphasis [ref=e145]: None of them should be bespoke.
        - text: They are infrastructure — and infrastructure that is bespoke in a thousand hospitals is also broken in a thousand hospitals.
      - paragraph [ref=e146]: Asclepius is the missing layer underneath. It is not a model, not an EHR, not a governance committee. It is the substrate that turns any clinical-AI inference — a GPT-class scribe, a radiology CNN, an internal LLM agent, a rule engine — into something auditable, rate-limited, schema-checked, consent-aware, and replayable, through one runtime, with byte-equal artifacts a regulator can reverify offline.
