      - list [ref=e539]:
        - listitem [ref=e540]:
          - time [ref=e541]: 2025–26
          - heading "DPDP Act, 2023, in force" [level=3] [ref=e542]
          - paragraph [ref=e543]: Every consent-mediated processing of personal data needs a recorded purpose, a TTL, and — for § 7 emergencies — a deferred-consent justification with a defensible window. No substrate, no defensible bundle.
        - listitem [ref=e544]:
          - time [ref=e545]: 2025–26
          - heading "ABDM / NHA consent fabric" [level=3] [ref=e546]
          - paragraph [ref=e547]: HIP / HIU exchanges land on a stable consent-artefact wire format. The kernel that wraps clinical AI underneath has to round-trip that envelope; piping it through bespoke per-operator code does not scale.
        - listitem [ref=e548]:
          - time [ref=e549]: 2025–26
          - heading "CDSCO SaMD guidance" [level=3] [ref=e550]
          - paragraph [ref=e551]: India's medical-devices regime now reaches AI-driven software. The artefacts a CDSCO reviewer expects — model lineage, drift, post-market performance — are exactly what an audit substrate emits, or not.
        - listitem [ref=e552]:
          - time [ref=e553]: 2026 Q1–Q2
          - heading "FDA, EU AI Act, AB 3030 in parallel" [level=3] [ref=e554]
          - paragraph [ref=e555]: For operators with US or EU exposure, lifecycle validation, Article 12 record-keeping, and AB 3030 disclosure obligations land at the same time. One substrate, every regime.
