      - generic [ref=e130]:
        - generic [ref=e131]:
          - generic [ref=e132]: §04
          - generic [ref=e133]: wrap your own model
        - heading "Wrap your own model." [level=2] [ref=e134]
        - paragraph [ref=e135]:
          - text: The wrap-scribe example is twenty lines without comments. Replace the mock callback with your own and you have an audited inference. The pattern is always the same —
          - emphasis [ref=e136]: open, push, begin, run, commit
          - text: .
        - generic [ref=e137]: "#include <asclepius/asclepius.hpp> using namespace asclepius; int main() { // 1. open the runtime against a SQLite file (created on first open) auto rt = Runtime::open(\"./asclepius.db\").value(); // 2. push policies — order matters; first block wins rt.policies().push(make_phi_scrubber()); rt.policies().push(make_length_limit(8000, 8000)); // 3. begin one inference, scoped to a clinician + patient + purpose auto inf = rt.begin_inference({ .model = ModelId{\"my-scribe\", \"v1\"}, .actor = ActorId::clinician(\"dr.smith\"), .patient = PatientId::pseudonymous(\"p_9f1a\"), .encounter = EncounterId::make(), .purpose = Purpose::ambient_documentation, }).value(); // 4. run — the model_call lambda is your model. Anything callable. auto model_call = [](std::string_view in) -> std::string { // in production: call your transformer, your gRPC stub, // your scribe vendor's HTTP endpoint. Whatever returns text. return \"SOAP: subjective ...\\nobjective ...\\nassessment ...\\nplan ...\"; }; auto out = inf.run(\"chief complaint: chest pain, 2h\", model_call).value(); // 5. commit — appends one signed inference.committed entry inf.commit().value(); std::cout << \"ok · seq=\" << inf.seq().value() << \" · output=\" << out << \"\\n\"; }"
        - paragraph [ref=e138]:
          - text: Five calls, in order.
          - code [ref=e139]: open
          - text: gives you a runtime;
          - code [ref=e140]: policies().push
          - text: wires the input/output filter chain;
          - code [ref=e141]: begin_inference
          - text: creates a scoped handle that already knows the clinician, patient, and purpose;
          - code [ref=e142]: inf.run
          - text: sends the input through the input policies, invokes your model callback, sends the output through the output policies, and stages the entry;
          - code [ref=e143]: inf.commit
          - text: signs and appends.
        - paragraph [ref=e144]:
          - text: If a policy
          - emphasis [ref=e145]: blocks
          - text: ","
          - code [ref=e146]: run
          - text: returns an error and no
          - code [ref=e147]: inference.committed
          - text: entry is appended — but an
          - code [ref=e148]: inference.aborted
          - text: entry
          - emphasis [ref=e149]: is
          - text: ", so the refusal itself is auditable."
          - emphasis [ref=e150]: The chain records what didn't happen as well as what did.
        - paragraph [ref=e151]:
          - generic [ref=e152]: compose
          - emphasis [ref=e153]:
            - text: Need a timeout?
            - code [ref=e154]: inf.run_with_timeout(in, model, 2000ms)
            - text: . Need cancellation?
            - code [ref=e155]: inf.run_cancellable(in, model, token)
            - text: . Need consent? Issue a token in
            - code [ref=e156]: rt.consent()
            - text: for the patient and purpose; the begin_inference call will refuse without one. The
            - link "/api" [ref=e157] [cursor=pointer]:
              - /url: api.html
            - text: page lists every overload.
