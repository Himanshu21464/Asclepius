          - text: The example program at
          - code [ref=e75]: examples/01_wrap_scribe/main.cpp
          - text: "opens a runtime against a fresh SQLite file, pushes the default policy chain, and wraps one inference against a tiny mock scribe callback. On disk, three things appeared next to the binary:"
