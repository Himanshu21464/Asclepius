        - paragraph [ref=e61]:
          - generic [ref=e62]: prereqs
          - emphasis [ref=e63]:
            - text: "build-essential, cmake (≥ 3.20), ninja-build, libsodium-dev, libsqlite3-dev. On Debian/Ubuntu:"
            - code [ref=e64]: sudo apt install build-essential cmake ninja-build libsodium-dev libsqlite3-dev
            - text: ". On macOS:"
            - code [ref=e65]: brew install cmake ninja libsodium
            - text: and SQLite via the system framework.
        - paragraph [ref=e66]:
          - text: If the third line printed an
          - emphasis [ref=e67]: ok
          - text: with a
          - code [ref=e68]: seq=1
          - text: and a 64-character hex head — you're done with the install. The substrate works on your machine. The rest of this page is what to do with it.
